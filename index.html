<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Control de Gastos</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f9; max-width: 400px; margin: auto; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #333; }
        input, select { width: 100%; padding: 12px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; }
        button { width: 100%; padding: 15px; background: #28a745; color: white; border: none; border-radius: 6px; font-size: 18px; cursor: pointer; font-weight: bold; }
        button:active { background: #218838; }
        h2 { text-align: center; color: #333; }
    </style>
</head>
<body>
    <h2>Registrar Gasto</h2>
    <form id="gastoForm">
        <div class="form-group">
            <label>Fecha</label>
            <input type="date" id="fecha" required>
        </div>
        <div class="form-group">
            <label>Concepto</label>
            <input type="text" id="concepto" placeholder="¿En qué gastaste?" required>
        </div>
        <div class="form-group">
            <label>Categoría</label>
            <select id="categoria">
                <option value="Comida">Comida</option>
                <option value="Transporte">Transporte</option>
                <option value="Servicios">Servicios</option>
                <option value="Ocio">Ocio</option>
            </select>
        </div>
        <div class="form-group">
            <label>Fuente de dinero (Reserva)</label>
            <select id="metodo">
                <option value="OSDE">OSDE</option>
                <option value="LUZ">LUZ</option>
                <option value="VISA Y AMEX SANTANDER">VISA Y AMEX SANTANDER</option>
                <option value="PLATA MENSUAL">PLATA MENSUAL</option>
                <option value="PSICOLOGO">PSICOLOGO</option>
                <option value="INTERNET Y TUENTI">INTERNET Y TUENTI</option>
                <option value="TARJETA CREDITO MERCADOPAGO">TARJETA CREDITO MERCADOPAGO</option>
                <option value="ALQUILER Y EXPENSAS">ALQUILER Y EXPENSAS</option>
                <option value="SALIDAS Y CORTE DE PELO">SALIDAS Y CORTE DE PELO</option>
                <option value="NARANJA X">NARANJA X</option>
                <option value="SUBE">SUBE</option>
                <option value="LAVARROPAS - BNA">LAVARROPAS - BNA</option>
                <option value="CAPSULAS DE CAFE">CAPSULAS DE CAFE</option>
            </select>
        </div>
        <div class="form-group">
            <label>Monto</label>
            <input type="number" id="monto" placeholder="Ej: 5000" required>
        </div>
        <button type="submit">Enviar Registro</button>
    </form>

    <script>
        document.getElementById('fecha').valueAsDate = new Date();
        const url = "TU_URL_AQUI"; // <-- Pega aquí tu URL de Apps Script
        
        document.getElementById('gastoForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const data = {
                fecha: document.getElementById('fecha').value,
                concepto: document.getElementById('concepto').value,
                categoria: document.getElementById('categoria').value,
                metodo: document.getElementById('metodo').value,
                monto: document.getElementById('monto').value
            };
            
            fetch(url, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            }).then(() => {
                alert('¡Gasto registrado con éxito!');
                document.getElementById('gastoForm').reset();
                document.getElementById('fecha').valueAsDate = new Date();
            });
        });
    </script>
</body>
</html>
