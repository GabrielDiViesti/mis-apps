<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Gastos</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 400px; margin: auto; }
        input, button { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { background-color: #007bff; color: white; border: none; }
    </style>
</head>
<body>
    <h2>Registrar Gasto</h2>
    <form id="gastoForm">
        <input type="date" id="fecha" required>
        <input type="text" id="concepto" placeholder="Concepto" required>
        <input type="text" id="categoria" placeholder="Categoría" required>
        <input type="text" id="reserva" placeholder="Reserva" required>
        <input type="number" id="monto" placeholder="Importe" required>
        <button type="button" onclick="enviarDatos()">Enviar</button>
    </form>

    <script>
        const url = "https://script.google.com/macros/s/AKfycbyzjLqYoKMDP3NLXtsFIr-Mdx4lfv_HwA3GbyqldzNClX5c0g5MAxzWxrLGVmyW9zqXmQ/exec"; 

        function enviarDatos() {
            const data = {
                fecha: document.getElementById('fecha').value,
                concepto: document.getElementById('concepto').value,
                categoria: document.getElementById('categoria').value,
                reserva: document.getElementById('reserva').value,
                monto: document.getElementById('monto').value
            };

            fetch(url, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(data)
            })
            .then(() => {
                alert("¡Gasto registrado con éxito!");
                document.getElementById('gastoForm').reset();
            });
        }
    </script>
</body>
</html>
