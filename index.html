<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Gastos</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 400px; margin: auto; }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { background-color: #007bff; color: white; border: none; font-size: 16px; font-weight: bold; }
    </style>
</head>
<body>
    <h2>Registrar Gasto</h2>
    <form id="gastoForm">
        <label>Fecha:</label>
        <input type="date" id="fecha" required>

        <label>Concepto:</label>
        <input type="text" id="concepto" placeholder="Ej: Supermercado" required>
        
        <label>Categoría:</label>
        <select id="categoria">
            <option value="Comida">Comida</option>
            <option value="Transporte">Transporte</option>
            <option value="Ocio">Ocio</option>
            <option value="Salidas">Salidas</option>
        </select>

        <label>Reserva:</label>
        <select id="reserva">
            <option value="PLATA MENSUAL">PLATA MENSUAL</option>
            <option value="SALIDAS">SALIDAS</option>
            <option value="OSDE">OSDE</option>
            <option value="TUENTI Y LUZ">TUENTI Y LUZ</option>
            <option value="VISA Y AMEX SANTANDER">VISA Y AMEX SANTANDER</option>
            <option value="PSICOLOGO">PSICOLOGO</option>
            <option value="INTERNET">INTERNET</option>
            <option value="TARJETA CREDITO MERCADOPAGO">TARJETA CREDITO MERCADOPAGO</option>
            <option value="ALQUILER Y EXPENSAS">ALQUILER Y EXPENSAS</option>
            <option value="NARANJA X">NARANJA X</option>
            <option value="SUBE">SUBE</option>
            <option value="LAVARROPAS - BNA">LAVARROPAS - BNA</option>
        </select>

        <label>Importe:</label>
        <input type="number" id="monto" placeholder="Ej: 5000" required>

        <button type="button" onclick="enviarDatos()">Enviar Registro</button>
    </form>

    <script>
        const url = "TU_URL_AQUI"; // REEMPLAZA CON TU URL

        function enviarDatos() {
            const data = {
                fecha: document.getElementById('fecha').value,
                concepto: document.getElementById('concepto').value,
                categoria: document.getElementById('categoria').value,
                reserva: document.getElementById('reserva').value,
                monto: document.getElementById('monto').value
            };

            fetch(url, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(data)
            })
            .then(() => {
                alert("¡Gasto registrado con éxito!");
                document.getElementById('gastoForm').reset();
            })
            .catch(err => alert("Error al enviar: " + err));
        }
    </script>
</body>
</html>
