<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Gastos</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 400px; margin: auto; }
        input, select, button { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { background-color: #28a745; color: white; border: none; font-size: 16px; }
    </style>
</head>
<body>
    <h2>Registrar Gasto</h2>
    <form id="gastoForm">
        <label>Fecha:</label>
        <input type="date" id="fecha" required>

        <label>Concepto:</label>
        <input type="text" id="concepto" required>

        <label>Categoría:</label>
        <input type="text" id="categoria" required>

        <label>Reserva:</label>
        <select id="reserva">
            <option value="Sin reserva">Sin reserva</option>
            <option value="Reserva A">Reserva A</option>
            <option value="Reserva B">Reserva B</option>
        </select>

        <label>Importe:</label>
        <input type="number" id="monto" required>

        <button type="button" onclick="enviarDatos()">Enviar Registro</button>
    </form>

    <script>
        const url = "TU_URL_AQUI"; // RECUERDA PEGAR TU URL AQUÍ

        function enviarDatos() {
            const data = {
                fecha: document.getElementById('fecha').value,
                concepto: document.getElementById('concepto').value,
                categoria: document.getElementById('categoria').value,
                reserva: document.getElementById('reserva').value,
                monto: document.getElementById('monto').value
            };

            fetch(url, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(data)
            })
            .then(() => {
                alert("¡Gasto registrado con éxito!");
                document.getElementById('gastoForm').reset();
            });
        }
    </script>
</body>
</html>
