<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Gastos</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; padding: 20px; max-width: 400px; margin: auto; background-color: #f4f7f6; }
        h2 { text-align: center; color: #333; }
        label { font-weight: bold; display: block; margin-top: 15px; }
        input { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; margin-top: 25px; background-color: #007bff; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
        button:active { background-color: #0056b3; }
    </style>
</head>
<body>
    <h2>Registro de Gastos</h2>
    <form id="gastoForm">
        <label>Fecha:</label>
        <input type="date" id="fecha" required>

        <label>Concepto:</label>
        <input type="text" id="concepto" required>

        <label>Categoría:</label>
        <input type="text" id="categoria" required>

        <label>Reserva:</label>
        <input type="text" id="reserva" placeholder="Escribe aquí la reserva...">

        <label>Importe:</label>
        <input type="number" id="monto" required>

        <button type="button" onclick="enviarDatos()">Enviar Registro</button>
    </form>

    <script>
        const url = "https://script.google.com/macros/s/AKfycbyzjLqYoKMDP3NLXtsFIr-Mdx4lfv_HwA3GbyqldzNClX5c0g5MAxzWxrLGVmyW9zqXmQ/exec"; 

        function enviarDatos() {
            const data = {
                fecha: document.getElementById('fecha').value,
                concepto: document.getElementById('concepto').value,
                categoria: document.getElementById('categoria').value,
                reserva: document.getElementById('reserva').value,
                monto: document.getElementById('monto').value
            };

            fetch(url, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(data)
            })
            .then(() => {
                alert("¡Gasto registrado con éxito!");
                document.getElementById('gastoForm').reset();
            });
        }
    </script>
</body>
</html>
