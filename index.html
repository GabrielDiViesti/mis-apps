<!DOCTYPE html>
<html>
<body>
    <h2>Registrar Gasto</h2>
    <form id="gastoForm">
        <label>Fecha:</label><br>
        <input type="date" id="fecha" required><br><br>

        <label>Concepto:</label><br>
        <input type="text" id="concepto" required><br><br>

        <label>Categoría:</label><br>
        <input type="text" id="categoria" required><br><br>

        <label>Reserva:</label><br>
        <select id="reserva">
            <option value="Sin reserva">Sin reserva</option>
            <option value="Reserva A">Reserva A</option>
            <option value="Reserva B">Reserva B</option>
        </select><br><br>

        <label>Importe:</label><br>
        <input type="number" id="monto" required><br><br>

        <button type="button" onclick="enviarDatos()">Enviar Registro</button>
    </form>

    <script>
        const url = "https://script.google.com/macros/s/AKfycbyzjLqYoKMDP3NLXtsFIr-Mdx4lfv_HwA3GbyqldzNClX5c0g5MAxzWxrLGVmyW9zqXmQ/exec"; // RECUERDA PEGAR TU URL AQUÍ

        function enviarDatos() {
            const data = {
                fecha: document.getElementById('fecha').value,
                concepto: document.getElementById('concepto').value,
                categoria: document.getElementById('categoria').value,
                reserva: document.getElementById('reserva').value,
                monto: document.getElementById('monto').value
            };

            fetch(url, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(data)
            })
            .then(() => {
                alert("¡Gasto registrado con éxito!");
                document.getElementById('gastoForm').reset();
            });
        }
    </script>
</body>
</html>
